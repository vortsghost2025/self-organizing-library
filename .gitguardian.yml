# GitGuardian configuration
# This file suppresses false positives from lane protocol artifacts.

version: 2

# ── Lane relay messages ────────────────────────────────────────────────
# Cross-lane messages (inbox/outbox) contain EdDSA JWT signatures
# as part of the lane relay protocol (JWS RS256 / EdDSA).
# These are NOT secrets — they are verifiable message signatures
# embedded intentionally for authentication.
# The corresponding private keys are in .identity/ (gitignored).
paths-ignore:
  - "lanes/*/inbox/*.json"
  - "lanes/*/outbox/*.json"
  - "lanes/broadcast/**/*.json"
  - "lanes/library/state/*.json"
  - "lanes/archivist/state/*.json"
  - "lanes/swarmmind/state/*.json"
  - "lanes/kernel/state/*.json"
  - "lanes/library/journal/*.jsonl"

# ── Trust store (public keys only) ─────────────────────────────────────
# trust-store.json contains Ed25519/RSA PUBLIC keys for all 4 lanes.
# These are verification keys, NOT private keys. GitGuardian flags
# the PEM blocks but they are all public keys.
  - "lanes/broadcast/trust-store.json"

# ── Identity directory ─────────────────────────────────────────────────
# .identity/ is gitignored but some files were tracked before gitignore.
# snapshot.json contains public key metadata only.
# sign-snapshot.js is a signing script (loads key from env at runtime).
# keys.json and snapshot.jws have been untracked as of 2026-05-14.
  - ".identity/snapshot.json"
  - ".identity/sign-snapshot.js"

# ── Guard seals ─────────────────────────────────────────────────────────
# Seal files contain content hashes for integrity verification,
# not secrets. The path is hex-encoded (not identifying).
  - ".guard-seals/*.json"

# ── Graph write guard logs ──────────────────────────────────────────────
# Audit logs may reference file paths that look like hex secrets.
  - "logs/*.json"

# ── Site index content snippets ─────────────────────────────────────────
# site-index.json contains document content excerpts that may
# mention "secret" or "password" in documentation text.
# These are excerpts from markdown docs, not actual secrets.
  - "data/site-index.json"

# ── Governance documents ────────────────────────────────────────────────
# Governance JSON files may contain JWS signatures, key fingerprints,
# and hex-encoded identifiers that trigger detectors.
  - "governance/**/*.json"

# ── Schemas ─────────────────────────────────────────────────────────────
# Schema files may contain example JWT/JWS structures for documentation.
  - "schemas/**/*.json"

# ── CI auto-commit state files ──────────────────────────────────────────
# The library lane-worker auto-commits state syncs every 5 minutes.
# These state files contain task chain data and active-owner records
# with hex identifiers that trigger detectors.
  - "logs/task-chain.log"
