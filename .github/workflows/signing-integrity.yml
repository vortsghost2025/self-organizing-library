name: Signing Integrity Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
- run: node scripts/test-ci-signing.js
  env:
    LANE_ROOT: ${{ github.workspace }}
- run: node scripts/trust-store-mutation-guard.js
  env:
    LANE_ROOT: ${{ github.workspace }}
